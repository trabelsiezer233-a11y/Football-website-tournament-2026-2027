<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    font-family:Tahoma,sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding-top:120px;
}

input{
    padding:10px;
    width:220px;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

#panel{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>🔐 Admin Login</h2>

<input type="password" id="pass" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>

<div id="panel">

    <h3>🟢 Admin Menu</h3>

    <button onclick="openBracket()">📊 Open Bracket</button>
    <button onclick="logout()">🚪 Logout</button>

</div>

<script>

const PASSWORD = "1234";

function login(){

    let pass = document.getElementById("pass").value;

    if(pass === PASSWORD){

        document.getElementById("panel").style.display = "block";

        alert("Welcome Admin");

    } else {
        alert("Wrong Password");
    }
}


// 🔓 فتح bracket بصلاحية admin
function openBracket(){

    sessionStorage.setItem("bracket_admin_token", "ACTIVE");

    window.location.href = "bracket.html";
}


// 🚪 logout (يقفل كل شيء)
function logout(){

    sessionStorage.removeItem("bracket_admin_token");

    localStorage.removeItem("isAdmin");

    alert("Logged out");

    location.reload();
}

</script>

</body>
</html>
