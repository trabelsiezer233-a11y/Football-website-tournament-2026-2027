   <script>

window.onload = function () {

    const inputs = document.querySelectorAll("input");

    // تحميل البيانات
    let data = JSON.parse(localStorage.getItem("tournamentData") || "[]");

    inputs.forEach((i, index) => {
        i.value = data[index] || "";
    });

    // 🔐 check admin session
    const admin = sessionStorage.getItem("bracket_admin_token");

    if (admin === "ACTIVE") {

        document.getElementById("status").innerText = "🟢 Admin Mode";

        document.getElementById("adminBar").style.display = "block";

        inputs.forEach(i => {
            i.disabled = false;
            i.readOnly = false;
        });

    } else {

        document.getElementById("status").innerText = "🔒 User Mode";

        document.getElementById("adminBar").style.display = "none";

        inputs.forEach(i => {
            i.disabled = true;
            i.readOnly = true;
        });
    }
};


// 💾 Save
function saveData() {

    let data = [];

    document.querySelectorAll("input").forEach(i => {
        data.push(i.value);
    });

    localStorage.setItem("tournamentData", JSON.stringify(data));

    alert("Saved!");
}


// ↩ Back to admin
function returnToAdmin() {
    window.location.href = "admin.html";
}

</script>
